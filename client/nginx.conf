# Preserve the protocol the *edge* saw. In prod a host TLS proxy terminates HTTPS
# and forwards to this nginx over plain HTTP, so $scheme here is "http". Trusting
# $scheme would downgrade X-Forwarded-Proto to http and make Node treat the request
# as insecure — which makes express-session drop the secure/SameSite=None session
# cookie (logins silently never persist). So prefer the upstream X-Forwarded-Proto
# when present, and fall back to $scheme only when there is no proxy in front.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the server container — same-origin from the browser's view,
    # so no CORS/cross-site-cookie concerns in the full Docker stack.
    location /api/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # SPA fallback for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
