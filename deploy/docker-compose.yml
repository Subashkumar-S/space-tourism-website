# Full containerized stack: mongo + redis + server + client.
# Everything runs in Docker; the client (nginx) serves the CRA build and
# reverse-proxies /api to the server, so the whole app is same-origin.
#
#   docker compose --env-file .env -f deploy/docker-compose.yml up --build   # start
#   docker compose --env-file .env -f deploy/docker-compose.yml down          # stop
#
# Everything reads the SINGLE repo-root .env (copy .env.example -> .env). Its keys
# are prefixed SPACE_ so this project never collides with the other projects on
# the shared host. The server service gets the whole file via env_file and the app
# aliases SPACE_FOO -> FOO at boot (server/src/config/env.ts); the in-container
# names below then override the host-specific values. Every value has a safe
# default, so the stack comes up with just SPACE_SECRET set.
# Exception: REACT_APP_API_BASE_URL keeps its CRA prefix (CRA only exposes
# REACT_APP_*) and feeds the client build arg.
#
# For day-to-day development prefer docker-compose.dev.yml (infra only) and run
# the client + server natively — faster feedback with hot reload.

services:
  mongo:
    image: mongo:7
    container_name: space-tourism-mongo
    restart: unless-stopped
    # Internal only — reached over the compose network, never published.
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: space-tourism-redis
    restart: unless-stopped
    # Internal only — reached over the compose network, never published.

  server:
    build:
      context: ../server
      target: production
    container_name: space-tourism-server
    restart: unless-stopped
    env_file:
      - ../.env
    # env_file injects the SPACE_-prefixed root .env; the app aliases SPACE_FOO ->
    # FOO at boot. The `environment` block below then overrides the host-specific
    # values, defaulting to the compose-network hostnames for the all-in-docker
    # stack (environment wins over env_file for the same key).
    environment:
      NODE_ENV: "${SPACE_NODE_ENV:-production}"
      PORT: "${SPACE_PORT:-5000}"
      MONGODB_URI: "${SPACE_MONGODB_URI:-mongodb://mongo:27017/space-tourism}"
      REDIS_URL: "${SPACE_REDIS_URL:-redis://redis:6379}"
      # Public origin — client + /api are same-origin behind nginx on :8082.
      # CLIENT_ORIGIN, the Google callback and the Stripe success/cancel + webhook
      # URLs all derive from this. Set SPACE_APP_URL to the subdomain in prod.
      APP_URL: "${SPACE_APP_URL:-http://localhost:8082}"
    ports:
      - "${SPACE_BIND_IP:-127.0.0.1}:${SPACE_SERVER_HOST_PORT:-8092}:${SPACE_PORT:-5000}"
    depends_on:
      - mongo
      - redis

  client:
    build:
      context: ../client
      args:
        # Same-origin: the browser calls /api and nginx proxies it to the server.
        # Keeps the REACT_APP_ prefix (CRA only exposes REACT_APP_*), so it is read
        # straight from the root .env rather than via a SPACE_-prefixed alias.
        REACT_APP_API_BASE_URL: "${REACT_APP_API_BASE_URL:-/api}"
    container_name: space-tourism-client
    restart: unless-stopped
    ports:
      - "${SPACE_BIND_IP:-127.0.0.1}:${SPACE_CLIENT_HOST_PORT:-8082}:80"
    depends_on:
      - server

volumes:
  mongo-data:
