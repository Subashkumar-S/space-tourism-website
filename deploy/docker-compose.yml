# Full containerized stack: mongo + redis + server + client.
# Everything runs in Docker; the client (nginx) serves the CRA build and
# reverse-proxies /api to the server, so the whole app is same-origin.
#
#   docker compose -f deploy/docker-compose.yml up --build      # start everything
#   docker compose -f deploy/docker-compose.yml down            # stop
#
# Compose-level variables are prefixed with SPACE_ so this project never collides
# with the other projects on a shared host/.env. The in-container names (left of
# the colon) are what the app reads and stay unprefixed. Every value has a safe
# default, so the stack comes up with no extra config.
#
# Container-internal secrets (SECRET, Stripe, Google, Resend, …) come from
# ../server/.env via env_file — that file is per-project, so those names are
# already isolated and are NOT prefixed (the app reads them directly).
#
# For day-to-day development prefer docker-compose.dev.yml (infra only) and run
# the client + server natively — faster feedback with hot reload.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    # Internal only — reached over the compose network, never published.
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Internal only — reached over the compose network, never published.

  server:
    build:
      context: ../server
      target: production
    restart: unless-stopped
    env_file:
      - ../server/.env
    # The `environment` block overrides env_file so the shared, collision-prone
    # values are env-configurable per project (SPACE_*) and default to the
    # compose-network hostnames for the all-in-docker stack.
    environment:
      NODE_ENV: "${SPACE_NODE_ENV:-production}"
      PORT: "${SPACE_PORT:-5000}"
      MONGODB_URI: "${SPACE_MONGODB_URI:-mongodb://mongo:27017/space-tourism}"
      REDIS_URL: "${SPACE_REDIS_URL:-redis://redis:6379}"
      CLIENT_ORIGIN: "${SPACE_CLIENT_ORIGIN:-http://localhost:8082}"
    ports:
      - "${SPACE_BIND_IP:-127.0.0.1}:${SPACE_SERVER_HOST_PORT:-8092}:${SPACE_PORT:-5000}"
    depends_on:
      - mongo
      - redis

  client:
    build:
      context: ../client
      args:
        # Same-origin: the browser calls /api and nginx proxies it to the server.
        REACT_APP_API_BASE_URL: "${SPACE_API_BASE_URL:-/api}"
    restart: unless-stopped
    ports:
      - "${SPACE_BIND_IP:-127.0.0.1}:${SPACE_CLIENT_HOST_PORT:-8082}:80"
    depends_on:
      - server

volumes:
  mongo-data:
