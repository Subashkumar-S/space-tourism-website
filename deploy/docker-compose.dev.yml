# Local development — INFRA ONLY (mongo + redis).
# Run the client and server natively on your machine against these containers:
#
#   docker compose -f deploy/docker-compose.dev.yml up -d   # start mongo + redis
#   cd server && npm install && npm run dev                 # API on :5000 (tsx watch)
#   cd client && npm install && npm start                   # CRA on :3000
#   docker compose -f deploy/docker-compose.dev.yml down    # stop infra
#
# Ports are published to the host so the native processes connect via localhost
# (server/.env defaults to mongodb://localhost:27017 and redis://localhost:6379).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-dev-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mongo-dev-data:
